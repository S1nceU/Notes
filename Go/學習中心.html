<title>Go × K8s × AI Platform 學習中心</title>
<style>
:root{
  --bg:#f2f5f6; --surface:#ffffff; --surface2:#e9eef0; --ink:#17262e; --ink2:#5b6e78;
  --line:#d8e0e4; --accent:#00758d; --accent-soft:#d9edf2; --accent-ink:#ffffff;
  --done:#1d8a5f; --done-soft:#dcf0e6; --warn:#b3661a; --warn-soft:#f6e8d8;
  --code-bg:#0e1a20; --code-ink:#c9dfe8;
  --mono:"Cascadia Code","JetBrains Mono",Consolas,"Courier New",monospace;
  --sans:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0b1116; --surface:#111a21; --surface2:#18242d; --ink:#d9e5ec; --ink2:#8aa0ac;
    --line:#243440; --accent:#3fc1d8; --accent-soft:#0e2f38; --accent-ink:#06272e;
    --done:#4cc593; --done-soft:#123527; --warn:#e0a35c; --warn-soft:#3a2a14;
    --code-bg:#0a141a; --code-ink:#c9dfe8;
  }
}
:root[data-theme="dark"]{
  --bg:#0b1116; --surface:#111a21; --surface2:#18242d; --ink:#d9e5ec; --ink2:#8aa0ac;
  --line:#243440; --accent:#3fc1d8; --accent-soft:#0e2f38; --accent-ink:#06272e;
  --done:#4cc593; --done-soft:#123527; --warn:#e0a35c; --warn-soft:#3a2a14;
  --code-bg:#0a141a; --code-ink:#c9dfe8;
}
:root[data-theme="light"]{
  --bg:#f2f5f6; --surface:#ffffff; --surface2:#e9eef0; --ink:#17262e; --ink2:#5b6e78;
  --line:#d8e0e4; --accent:#00758d; --accent-soft:#d9edf2; --accent-ink:#ffffff;
  --done:#1d8a5f; --done-soft:#dcf0e6; --warn:#b3661a; --warn-soft:#f6e8d8;
  --code-bg:#0e1a20; --code-ink:#c9dfe8;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.65;font-size:15.5px}
a{color:var(--accent)}
button{font-family:inherit}

/* ---------- header ---------- */
.hdr{background:var(--surface);border-bottom:1px solid var(--line);padding:26px 22px 0}
.hdr-in{max-width:1060px;margin:0 auto}
.eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin:0 0 8px}
.hdr h1{margin:0 0 6px;font-size:clamp(21px,3.4vw,30px);line-height:1.25;text-wrap:balance;letter-spacing:.01em}
.hdr .sub{color:var(--ink2);margin:0;font-size:14px;max-width:66ch}
.hdr-stats{display:flex;flex-wrap:wrap;gap:12px;margin:18px 0 20px}
.stat{background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:10px 16px;min-width:130px;flex:0 1 auto}
.stat .lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);display:block}
.stat .val{font-family:var(--mono);font-size:21px;font-variant-numeric:tabular-nums;font-weight:600;color:var(--ink)}
.stat .val small{font-size:12px;color:var(--ink2);font-weight:400}
.stat.acc .val{color:var(--accent)}
.stat.done .val{color:var(--done)}

/* ---------- nav ---------- */
nav.tabs{position:sticky;top:0;z-index:30;background:var(--surface);border-bottom:1px solid var(--line);box-shadow:0 1px 0 var(--line)}
.tabs-in{max-width:1060px;margin:0 auto;display:flex;gap:2px;overflow-x:auto;padding:0 14px}
.tab{appearance:none;background:none;border:none;border-bottom:3px solid transparent;padding:12px 14px 10px;font-size:14.5px;color:var(--ink2);cursor:pointer;white-space:nowrap;font-weight:500}
.tab:hover{color:var(--ink)}
.tab:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;border-radius:6px}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}

/* ---------- layout ---------- */
main{max-width:1060px;margin:0 auto;padding:26px 22px 80px}
section.pane{display:none}
section.pane.on{display:block}
h2.sec{font-size:20px;margin:34px 0 6px;letter-spacing:.01em}
h2.sec:first-child{margin-top:0}
p.lede{color:var(--ink2);margin:0 0 18px;max-width:70ch}
.card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin:0 0 16px}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px;margin-bottom:16px}
.grid2 .card{margin:0}

/* ---------- progress bars ---------- */
.bar{height:7px;background:var(--surface2);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.bar>i{display:block;height:100%;background:var(--accent);border-radius:99px;width:0;transition:width .35s ease}
.bar.g>i{background:var(--done)}
@media (prefers-reduced-motion: reduce){.bar>i{transition:none}}

/* ---------- pipeline ---------- */
.pipe{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin:14px 0 8px}
.pstep{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;position:relative}
.pstep .num{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--ink2);text-transform:uppercase}
.pstep h3{margin:4px 0 6px;font-size:15.5px}
.pstep .meta{font-size:13px;color:var(--ink2);margin-bottom:10px;min-height:2.6em}
.pstep.sdone{border-color:var(--done)}
.pstep.sdoing{border-color:var(--accent)}

/* ---------- chips ---------- */
.chip{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.06em;border-radius:99px;padding:2px 10px;font-weight:600;vertical-align:middle}
.chip.todo{background:var(--surface2);color:var(--ink2);border:1px solid var(--line)}
.chip.doing{background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent)}
.chip.ok{background:var(--done-soft);color:var(--done);border:1px solid var(--done)}
.chip.opt{background:var(--warn-soft);color:var(--warn);border:1px solid var(--warn)}

/* ---------- phase / week ---------- */
.phase{margin:0 0 26px;border-left:3px solid var(--line);padding-left:18px;position:relative}
.phase.pdone{border-left-color:var(--done)}
.phase.pdoing{border-left-color:var(--accent)}
.phase-head{display:flex;flex-wrap:wrap;align-items:baseline;gap:10px;margin-bottom:4px}
.phase-head .pn{font-family:var(--mono);font-size:12px;letter-spacing:.14em;color:var(--accent);text-transform:uppercase;font-weight:700}
.phase-head h3{margin:0;font-size:17.5px}
.phase-head .pr{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--ink2);font-variant-numeric:tabular-nums}
.phase-goal{color:var(--ink2);font-size:13.5px;margin:0 0 12px;max-width:72ch}
details.week{background:var(--surface);border:1px solid var(--line);border-radius:12px;margin:0 0 10px;overflow:hidden}
details.week[data-done="1"]{border-color:var(--done)}
details.week>summary{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;list-style:none;user-select:none}
details.week>summary::-webkit-details-marker{display:none}
details.week>summary:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
.wk-num{font-family:var(--mono);font-size:12px;font-weight:700;background:var(--accent-soft);color:var(--accent);border-radius:8px;padding:4px 9px;white-space:nowrap}
details.week[data-done="1"] .wk-num{background:var(--done-soft);color:var(--done)}
.wk-title{font-weight:600;font-size:15px;flex:1 1 auto;min-width:140px}
.wk-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.wk-pct{font-family:var(--mono);font-size:11.5px;color:var(--ink2);font-variant-numeric:tabular-nums;min-width:38px;text-align:right}
.wk-bar{width:74px}
.wk-caret{color:var(--ink2);font-size:11px;transition:transform .2s}
details.week[open] .wk-caret{transform:rotate(90deg)}
@media (prefers-reduced-motion: reduce){.wk-caret{transition:none}}
.wk-body{padding:4px 18px 16px;border-top:1px solid var(--line)}

/* ---------- sections inside week ---------- */
.blk{margin:14px 0 0}
.blk h4{margin:0 0 8px;font-size:12px;font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--ink2)}
.blk.accept h4{color:var(--done)}
.blk.exp h4{color:var(--warn)}
.blk .note{font-size:13.5px;color:var(--ink2);margin:0 0 8px;max-width:72ch}
ul.ck{list-style:none;margin:0;padding:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));gap:2px 18px}
ul.ck.one{grid-template-columns:1fr}
ul.ck li{margin:0}
ul.ck label{display:flex;gap:9px;align-items:flex-start;padding:4px 6px;border-radius:7px;cursor:pointer;font-size:14px}
ul.ck label:hover{background:var(--surface2)}
ul.ck input{appearance:none;width:16px;height:16px;min-width:16px;border:1.6px solid var(--ink2);border-radius:4.5px;margin-top:3.5px;cursor:pointer;position:relative;background:var(--surface)}
ul.ck input:checked{background:var(--done);border-color:var(--done)}
ul.ck input:checked::after{content:"";position:absolute;left:4.4px;top:1.2px;width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(42deg)}
ul.ck input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
ul.ck input:checked+span{color:var(--ink2);text-decoration:line-through;text-decoration-color:var(--line);text-decoration-thickness:1.5px}
.ck-d{font-size:12.3px;color:var(--ink2);margin:-2px 6px 6px 31px;line-height:1.55;max-width:62ch}
.ck-d::before{content:"驗證 › ";color:var(--accent);font-family:var(--mono);font-size:10px;letter-spacing:.08em;font-weight:700}
ul.ck li:has(input:checked) .ck-d{opacity:.45}
.blk.accept ul.ck input:checked{background:var(--done);border-color:var(--done)}

/* ---------- code ---------- */
pre.code{background:var(--code-bg);color:var(--code-ink);font-family:var(--mono);font-size:12.6px;line-height:1.6;border-radius:10px;padding:14px 16px;overflow-x:auto;margin:8px 0;border:1px solid var(--line)}
pre.code .ct{display:block;color:#6f93a3;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px}

/* ---------- quiz ---------- */
.qgroup{margin-bottom:20px}
.qrow{display:flex;align-items:center;gap:12px;padding:8px 10px;border-bottom:1px solid var(--line)}
.qrow:last-child{border-bottom:none}
.qrow .qt{flex:1 1 auto;font-size:14px}
.qrow .hardmark{font-family:var(--mono);font-size:10px;color:var(--warn);border:1px solid var(--warn);border-radius:99px;padding:1px 7px;margin-left:8px;white-space:nowrap}
.seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{appearance:none;border:none;background:var(--surface);color:var(--ink2);font-size:12.5px;padding:5px 13px;cursor:pointer;font-weight:600}
.seg button+button{border-left:1px solid var(--line)}
.seg button:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
.seg button.y-on{background:var(--done);color:#fff}
.seg button.n-on{background:var(--warn);color:#fff}
.verdict{border-radius:12px;padding:16px 20px;margin:16px 0;border:1px solid var(--line);background:var(--surface)}
.verdict.v-go{border-color:var(--done);background:var(--done-soft)}
.verdict.v-fast{border-color:var(--accent);background:var(--accent-soft)}
.verdict.v-full,.verdict.v-base{border-color:var(--warn);background:var(--warn-soft)}
.verdict h3{margin:0 0 6px;font-size:16px}
.verdict p{margin:0;font-size:14px}
.verdict .score{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:700}

/* ---------- tables ---------- */
.twrap{overflow-x:auto;margin:10px 0}
table.t{border-collapse:collapse;width:100%;font-size:13.5px;min-width:520px}
table.t th{text-align:left;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);border-bottom:2px solid var(--line);padding:7px 12px 7px 0}
table.t td{border-bottom:1px solid var(--line);padding:7px 12px 7px 0;vertical-align:top}

/* ---------- misc ---------- */
details.fold{border:1px solid var(--line);border-radius:10px;background:var(--surface);margin-bottom:10px}
details.fold>summary{padding:11px 16px;cursor:pointer;font-weight:600;font-size:14.5px;list-style:none}
details.fold>summary::-webkit-details-marker{display:none}
details.fold>summary::before{content:"▸ ";color:var(--accent);font-size:12px}
details.fold[open]>summary::before{content:"▾ "}
details.fold>summary:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
details.fold .fold-body{padding:2px 18px 14px}
.tagline{font-family:var(--mono);font-size:12.5px;color:var(--ink2)}
.mono{font-family:var(--mono)}
.btn{appearance:none;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;font-weight:600}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn.danger:hover{border-color:var(--warn);color:var(--warn)}
.foot{margin-top:44px;border-top:1px solid var(--line);padding-top:18px;color:var(--ink2);font-size:12.5px;display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between}
.quote{border-left:3px solid var(--accent);padding:4px 0 4px 16px;margin:14px 0;color:var(--ink);font-size:15px;font-weight:500;max-width:66ch}
ol.demo{margin:8px 0;padding-left:22px;font-size:14px}
ol.demo li{margin:3px 0}
.hint{font-size:12.5px;color:var(--ink2)}
</style>

<header class="hdr">
  <div class="hdr-in">
    <p class="eyebrow">Go × Kubernetes × Cloud-Native AI Platform</p>
    <h1>平台工程學習中心</h1>
    <p class="sub">從先備知識檢核、前導補強,到 32 週完整主線 — 逐步打造一個以 Go 與 Kubernetes 為核心、可展示的 Mini Cloud-Native AI Platform。所有勾選進度會儲存在此瀏覽器。</p>
    <div class="hdr-stats">
      <div class="stat acc"><span class="lbl">檢核得分</span><span class="val" id="st-quiz">–<small> / 30</small></span></div>
      <div class="stat"><span class="lbl">前導進度</span><span class="val" id="st-pre">0<small> %</small></span></div>
      <div class="stat done"><span class="lbl">主計畫完成週數</span><span class="val" id="st-weeks">0<small> / 33 週</small></span></div>
      <div class="stat"><span class="lbl">主計畫總進度</span><span class="val" id="st-main">0<small> %</small></span></div>
    </div>
  </div>
</header>

<nav class="tabs"><div class="tabs-in" id="tabbar">
  <button class="tab" data-pane="overview">總覽</button>
  <button class="tab" data-pane="quiz">1 · 自我檢核</button>
  <button class="tab" data-pane="prelude">2 · 前導計畫</button>
  <button class="tab" data-pane="main">3 · 32 週主計畫</button>
  <button class="tab" data-pane="res">資源與參考</button>
</div></nav>

<main>
  <section class="pane" id="pane-overview"></section>
  <section class="pane" id="pane-quiz"></section>
  <section class="pane" id="pane-prelude"></section>
  <section class="pane" id="pane-main"></section>
  <section class="pane" id="pane-res"></section>
  <div class="foot">
    <span>學習資料來源:《32 週完整學習計畫》與《先備知識與前導學習指南》· 進度僅儲存於本機瀏覽器</span>
    <span style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn" id="btn-export">匯出進度</button>
      <button class="btn" id="btn-import">匯入進度</button>
      <input type="file" id="import-file" accept="application/json,.json" style="display:none">
      <button class="btn danger" id="btn-reset">重設所有進度</button>
    </span>
  </div>
</main>

<script>
/* ============================================================ state */
const KEY='gokai-plan-v1';
let st;
try{ st=JSON.parse(localStorage.getItem(KEY)||'{}'); }catch(e){ st={}; }
st.c=st.c||{}; st.q=st.q||{}; st.tab=st.tab||'overview';
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(st)); }catch(e){} }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ============================================================ quiz data */
const QUIZ=[
 {g:'Go 與 Backend',items:[
  ['能自行建立 Go module'],['能使用 struct、method、interface'],['能正確處理 error'],
  ['能閱讀 goroutine 與 channel 基礎程式'],['能建立 JSON REST API','hard'],['能將 request body 轉為 struct'],
  ['能回傳合理的 HTTP status code'],['能連接 MySQL 或 PostgreSQL'],['能完成基本 CRUD','hard'],
  ['知道 Middleware 的用途'],['知道 JWT 的基本運作方式'],['能區分 Authentication 與 Authorization']]},
 {g:'工具與環境',items:[
  ['能使用 Git commit、branch、merge、push','hard'],['能處理基本 merge conflict'],
  ['能在命令列啟動程式與查看 log','hard'],['能使用 curl 測試 API'],['能使用 environment variable'],
  ['能閱讀基本 Shell command'],['能寫基本 Dockerfile'],['能 build 並執行 Container','hard'],
  ['能閱讀 Docker log'],['能閱讀基本 YAML']]},
 {g:'基礎觀念',items:[
  ['知道 process 與 container 的差異'],['知道 image 與 container 的差異'],['知道 host、port、path 的意義'],
  ['知道 HTTP 與 HTTPS 的差異'],['知道 DNS 的用途'],['知道 index 與 transaction 的基本用途'],
  ['知道手動測試不能取代自動測試'],['能透過翻譯工具閱讀英文技術文件']]},
 {g:'加分項目(不計入 30 題核心分數)',bonus:true,items:[
  ['寫過 Unit Test'],['寫過 Handler Test'],['使用過 Docker Compose'],
  ['使用過 GitHub Actions'],['使用過 kubectl'],['在本機建立過 kind 或 k3d cluster']]}
];

/* ============================================================ prelude weeks */
const PRELUDE=[
 {w:1,t:'Go 語法與工具鏈',goal:'能獨立建立 Go 專案、熟悉基本語法與資料結構、理解 package 與 module。',secs:[
  {h:'學習內容',k:'learn',items:[
   'Go 安裝與環境||go version、go env 正常,能說明 module mode 下不需要 GOPATH 放專案。',
   'go run / go build / go test||能說明三者差異:直接執行、產出 binary、跑測試,並各執行過一次。',
   'go fmt / go vet||能格式化程式碼,並修正過至少一個 go vet 找到的問題(如 Printf 格式錯誤)。',
   'package 與 module||能建立含兩個以上 package 的 module,並正確 import 自己的 package。',
   'variable、constant、condition、loop||能不看範例寫出 if / for / switch,知道 Go 只有 for 一種迴圈。',
   'function、struct、pointer||能說明值傳遞與指標傳遞的差異:何時修改會影響呼叫端。',
   'slice 與 map||能說明 slice 共享底層陣列的行為(append 可能搬移),以及 map 取值的 ok 慣用法。']},
  {h:'實作任務:CLI Todo Application',k:'task',note:'指令:add / list / complete / remove,資料可先儲存在 JSON file。',items:['實作 add、list、complete、remove 指令','資料儲存於 JSON file']},
  {h:'驗收標準',k:'accept',items:['能拆分至少兩個 package','不依賴全域變數管理主要狀態','能正確處理檔案錯誤','通過 go fmt 與 go vet']}]},
 {w:2,t:'Interface、Error、Concurrency 與 Context',goal:'理解 Go 的 composition、建立 error handling 習慣、初步理解 cancellation。',secs:[
  {h:'學習內容',k:'learn',items:[
   'Interface 與 method set 基礎||能定義一個小 interface(1–2 個方法)並讓 struct 隱式實作,說明 Go 不需要 implements 關鍵字。',
   'Error wrapping、errors.Is、errors.As||能用 fmt.Errorf("...: %w", err) 包裝錯誤,並在上層用 errors.Is 判斷原始錯誤。',
   'defer||能說明 defer 在函式返回前執行(LIFO),並用它關閉檔案或解鎖。',
   'goroutine、channel||能用 go 啟動 goroutine 並透過 channel 把結果傳回 main。',
   'WaitGroup、Mutex 基礎||能用 WaitGroup 等待一組 goroutine 結束,用 Mutex 保護共享 map 不觸發 race。',
   'context.Background / WithCancel / WithTimeout||能寫出「工作在 timeout 或 cancel 時提前結束」的程式,並記得 defer cancel()。']},
  {h:'實作任務:可取消的 background job runner',k:'task',note:'提交工作 → Worker 執行 → 支援 Timeout → 支援 Cancel → 正確關閉 Goroutine。',items:['實作 worker 執行流程','支援 timeout 與 cancel','正確關閉 goroutine']},

   'startup fail-fast||能說明設定錯誤時要立即退出並印出原因,而不是帶病運行到半夜才炸。',
   'secrets 與普通 configuration 的區別||能說明 secret 需要:不進版控、可輪替、載入來源與一般設定分離。']},
  {h:'實作任務',k:'task',items:['定義 ErrJobNotFound、ErrQueueFull、ErrConflict','統一 API error schema','日誌包含 request ID、method、path、duration、status','config 缺漏時拒絕啟動','加入 log level 與 JSON log']},
  {h:'驗收標準',k:'accept',items:['Repository error 不直接洩漏到 HTTP response','可從一筆錯誤日誌追蹤完整 request','測試驗證錯誤映射與 log field']}]},
 {w:4,t:'Testing、Benchmark、pprof 與品質工具',secs:[
  {h:'必學內容',k:'learn',items:[
   'table-driven test 與 subtest||能寫 []struct 測資表 + t.Run,單一測試函式涵蓋多組成功/失敗案例。',
   'interface boundary||能為 repository 定義最小 interface,讓 service 測試時可注入 fake。',
   'fake、stub、mock、spy 的差異||能各用一句話說明差異(可運作的簡化實作/固定回傳/驗證互動/記錄呼叫),並手寫一個 fake。',
   'httptest.Server 與 integration test||能用 httptest.NewServer 起真 HTTP server 測完整 request → response 流程。',
   'benchmark 與 allocation||能寫 BenchmarkXxx 並用 -benchmem 解讀 ns/op 與 allocs/op。',
   'CPU、heap、goroutine、mutex profile||能開啟 net/http/pprof,抓 CPU 與 heap profile 並看懂火焰圖熱點。',
   'fuzz test 基礎||能寫 FuzzXxx 測 JSON parser 對任意輸入不 panic。',
   'coverage 的正確解讀||能說明覆蓋率高不等於測得好,並找出一段「有覆蓋但沒驗證行為」的測試。',
   'deterministic test 與 flaky test 常見原因||能舉出 flaky 三大成因(依賴時間、依賴順序、共享狀態)並修復一個。']},
  {h:'實作任務',k:'task',items:['Service unit tests','Handler tests','Repository fake','benchmark JSON encoding 與 queue operation','使用 pprof 找出一個刻意製造的 allocation hotspot','寫一個 fuzz test 測 JSON input parser']},
  {h:'驗收標準',k:'accept',items:['完成單元與整合測試','完成 benchmark 與 pprof 分析紀錄','建立第一個 release tag:v0.1-go-http']}]}
]},
{p:2,range:'第 5–7 週',title:'Production HTTP、Chi、Gin 邊界與 RPC',goal:'理解框架取捨,並建立對外 REST / Connect 與內部 RPC 契約。',outputs:['ConnectRPC Job Service','.proto contract 與 API versioning 文件','REST 與 RPC 選擇比較','一組 resilience test'],weeks:[
 {w:5,t:'Chi、Middleware Composition 與 Clean Boundary',secs:[
  {h:'必學內容',k:'learn',items:[
   'chi router 與標準 http.Handler 相容性||能說明 chi.Router 本身就是 http.Handler、middleware 就是 func(http.Handler) http.Handler,因此與標準庫完全互通。',
   'route group||能用 Route / Group 把 /api/v1 下的路由分組,並對群組掛不同 middleware。',
   'middleware chaining||能畫出洋蔥模型與執行順序,並說明 recovery 為何要放最外層。',
   'authentication / authorization middleware||能實作驗 token 並把身分放進 context 的 authn,以及在其後檢查資源擁有權的 authz。',
   'panic recovery||能攔截 handler panic 回 500,且 stack trace 只進 log 不回給 client。',
   'CORS||能說明 preflight(OPTIONS)請求與 Access-Control-Allow-Origin 的作用。',
   'rate limiting 基礎||能說明 token bucket 概念,並對單一 client 實作限流回 429。',
   'idempotency key||能說明 client 重送 POST 時,server 如何靠 Idempotency-Key 辨識重複請求。',
   'HTTP adapter 與 application service 分離||handler 只做解析/驗證/轉 DTO,商業邏輯全部在 service — 換掉 router 不需要動 service。']},
  {h:'架構原則',k:'code',code:'HTTP / Gin / Chi Context\n           ↓\n       Handler DTO\n           ↓\n   Application Service\n           ↓\n    Domain / Repository',note:'*gin.Context 不進入 application service;HTTP status code 不出現在 domain layer;DB model 不直接作為 API response。'},
  {h:'實作任務',k:'task',items:['將 Job API routing 改為 chi(或保留 Gin,但僅存在 transport layer)','實作 request ID、auth、recovery、timeout middleware','撰寫 ADR:為何選 chi、Gin 或 net/http']},
  {h:'驗收標準',k:'accept',items:['transport 與 application 邊界清楚','middleware 順序有測試或文件佐證','ADR 完成並入版控']}]},
 {w:6,t:'Protocol Buffers 與 API Contract',secs:[
  {h:'必學內容',k:'learn',items:[
   'message、field、enum、service||能手寫含 enum 與巢狀 message 的 .proto,enum 第一個值為 _UNSPECIFIED = 0。',
   'field number 與 wire compatibility||能說明 field number 才是序列化的身分(名稱可改、編號不可),改編號等於 breaking change。',
   'optional、repeated、map||能說明 proto3 optional 的 presence 語意(能區分「沒設」與「零值」)。',
   'timestamp、duration、well-known types||能使用 google.protobuf.Timestamp / Duration 而非自訂字串格式。',
   'package 與 version 命名||能以 platform.job.v1 風格命名,並說明升 v2 的時機。',
   'breaking change 與 backward / forward compatibility||能舉出三種 breaking change:重用已刪除編號、改欄位型別、改欄位語意。',
   'buf lint、buf breaking||能在 CI 對 main 分支跑 buf breaking,擋下不相容的修改。',
   'generated code 與手寫 code 的邊界||generated code 放獨立目錄、不手改;手寫 adapter 負責轉換 domain 型別。',
   'API pagination、filter、sort、resource name||能設計 page_token 式分頁與 resource name(如 tenants/{id}),並說明 offset 分頁的問題。']},
  {h:'實作任務:定義 JobService',k:'task',code:'service JobService {\n  rpc CreateJob(CreateJobRequest) returns (CreateJobResponse);\n  rpc GetJob(GetJobRequest) returns (GetJobResponse);\n  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);\n  rpc WatchJob(WatchJobRequest) returns (stream JobEvent);\n}',items:['完成 proto 定義與 code generation']},
  {h:'驗收標準',k:'accept',items:['buf lint 通過','建立 breaking change check','能解釋為何不能重複使用已刪除 field number']}]},
 {w:7,t:'ConnectRPC、gRPC Semantics 與 Resilience',secs:[
  {h:'必學內容',k:'learn',items:[
   'Connect protocol、gRPC、gRPC-Web||能說明三種協定差異與瀏覽器相容性,以及 ConnectRPC 一套實作同時支援三者的價值。',
   'unary RPC 與 server streaming||能實作一問一答與 server 持續推送兩種 RPC,並知道 stream 何時結束。',
   'client / bidirectional streaming 概念||能各說出一個適用場景(大檔上傳、雙向即時通訊)。',
   'interceptor||能寫一個 logging interceptor 套用到所有 RPC,等同 HTTP middleware 的角色。',
   'metadata / header||能在 client 附加 header(如 token)並在 server interceptor 取出。',
   'deadline 與 cancellation||能讓 client 設定的 deadline 傳到 server ctx,逾時後 server 端工作真的停止。',
   'RPC status code||能把 domain error 映射到 CodeNotFound / CodeAlreadyExists / CodeInvalidArgument 等。',
   'retry policy、exponential backoff、jitter||能實作指數退避 + 隨機抖動,並說明 jitter 防止的 thundering herd 問題。',
   'idempotency||能判斷哪些 RPC 可安全自動重試(讀取、冪等寫入),哪些不可(未去重的建立)。',
   'circuit breaker 概念||能說明三態轉換:closed → open(連續失敗)→ half-open(試探恢復)。',
   'request hedging 的風險||能說明對非冪等操作做 hedging(同時發多份請求)可能造成重複執行。']},
  {h:'實作任務',k:'task',items:['將 Job Service 提供 ConnectRPC endpoint','REST endpoint 作為外部相容層','WatchJob 透過 streaming 推送狀態','建立 auth interceptor','建立 logging、metrics interceptor','模擬 timeout、retry 與 duplicate request']},
  {h:'驗收標準',k:'accept',items:['ConnectRPC 與 REST 並存且行為一致','streaming 推送可運作','resilience 測試(timeout / retry / duplicate)通過','建立 release tag:v0.2-connectrpc']}]}
]},
{p:3,range:'第 8–10 週',title:'Container 與 Kubernetes 核心',goal:'把服務可靠地容器化、部署到 Kubernetes,並具備基礎除錯能力。',outputs:['Kubernetes manifests 或 Kustomize overlays','Kubernetes troubleshooting runbook','RBAC 權限矩陣','Container security checklist'],weeks:[
 {w:8,t:'Production Container Image',secs:[
  {h:'必學內容',k:'learn',items:[
   'multi-stage build||能寫 builder + runtime 兩階段 Dockerfile,最終 image 不含 Go toolchain 與原始碼。',
   'distroless / scratch / alpine 取捨||能說明三者差異(除錯工具、CA 憑證、shell、大小),並為自己的選擇給出理由。',
   'CGO 與 static binary||能用 CGO_ENABLED=0 產出 static binary,並解釋 scratch image 為何需要它。',
   'non-root user||能在 Dockerfile 以 USER 指定非 root,並在容器內用 id 驗證 uid 不是 0。',
   'read-only filesystem||能以唯讀 root filesystem 執行服務,需要寫入的目錄改掛 tmpfs/volume。',
   'signal handling||能說明 CMD 用 exec 形式(非 shell 包裝)讓 binary 直接成為 PID 1 接收 SIGTERM。',
   'image layer cache 與 .dockerignore||能安排先 COPY go.mod 再 COPY 原始碼讓依賴層可快取,並排除 .git 等無關檔案。',
   'architecture / platform build||知道 buildx 可產出 amd64/arm64 多平台 image,並理解 manifest 的角色。',
   'SBOM 基礎||能用 syft 等工具產出 SBOM,並說明它回答「這個 image 裡有哪些元件」。',
   'image vulnerability scanning||能用 trivy/grype 掃描 image,解讀 CVE 嚴重度並決定處理方式。',
   'OCI image、registry、tag 與 digest||能說明 tag 可被覆蓋、digest 不可變,因此正式部署要 pin digest。']},
  {h:'實作任務',k:'task',items:['建立小型、安全的 Job API image','使用 non-root','設定 read-only root filesystem','建立 healthcheck','使用 image digest 部署','產生 SBOM,執行 vulnerability scan']},
  {h:'驗收標準',k:'accept',items:['image 以 non-root 執行且體積精簡','SBOM 與掃描報告產出','以 digest 而非 latest 部署']}]},
 {w:9,t:'Kubernetes Workload、Config 與 Resource Management',secs:[
  {h:'必學資源',k:'learn',items:[
   'Pod、ReplicaSet、Deployment||能說明三層關係:Deployment 管理 ReplicaSet、RS 維持 Pod 數,rolling update 時新舊 RS 如何交替。',
   'StatefulSet||能說明穩定網路識別(pod-0、pod-1)與 per-pod PVC,並舉出何時需要它(資料庫)。',
   'Job / CronJob||能說明 completions / backoffLimit,並部署一個會失敗重試的 Job 觀察行為。',
   'Service||能說明 selector → Endpoints 的對應關係,以及 Pod 不 ready 時被移出 Endpoints。',
   'ConfigMap 與 Secret||能以 env 與 volume 兩種方式注入,並說明兩種方式在更新時的行為差異。',
   'Namespace||能說明它隔離什麼(名稱、quota、RBAC 範圍)與不隔離什麼(節點、CRD 定義)。',
   'requests / limits||能說明 request 決定排程、limit 觸發 CPU throttle 或 OOMKill,以及三種 QoS class。',
   'liveness、readiness、startup probe||能說明三者失敗的不同後果:重啟容器/摘除流量/延後前兩者生效。',
   'rolling update 與 rollback||能設定 maxSurge / maxUnavailable,並用 rollout undo 回滾一次。',
   'affinity、anti-affinity||能寫出「副本分散在不同節點」的 pod anti-affinity。',
   'taint、toleration||能說明方向:taint 是節點排斥 Pod、toleration 只是允許不是吸引。',
   'topology spread constraints||能讓副本平均分佈於節點或 zone。',
   'priority class 基礎||知道高優先權 Pod 可搶佔(preempt)低優先權 Pod 的影響。']},
  {h:'實作任務',k:'task',items:['將 Job API 部署到 kind','加入 probes','設定 requests / limits','執行 rolling update 與 rollback','刻意製造 OOMKilled、CrashLoopBackOff、ImagePullBackOff']},
  {h:'驗收標準',k:'accept',code:'kubectl get\nkubectl describe\nkubectl logs\nkubectl exec\nkubectl top\nkubectl events',items:['能使用左列指令完成基本根因分析']}]},
 {w:10,t:'Kubernetes Network、Storage 與 RBAC 基礎',secs:[
  {h:'必學內容',k:'learn',items:[
   'ClusterIP、NodePort、LoadBalancer||能說明三種 Service type 的流量路徑與適用環境(叢集內/開發測試/雲端對外)。',
   'DNS 與 service discovery||能說出 name.namespace.svc.cluster.local 的解析規則,並在 Pod 內 nslookup 驗證。',
   'Ingress 與 Gateway API 的角色差異||能說明 Gateway API 把「基礎設施(Gateway)」與「路由(Route)」分離的設計改善。',
   'CNI 基本概念||知道 Pod 網路由 CNI plugin 提供,NetworkPolicy 是否生效取決於 CNI 是否支援。',
   'NetworkPolicy||能寫 default-deny 加白名單放行,並理解「Pod 被任一 policy 選中後才進入限制模式」。',
   'PV、PVC、StorageClass||能說明動態供應流程:PVC 引用 StorageClass → 自動建立 PV → 綁定。',
   'volume lifecycle||能說明 reclaim policy Delete 與 Retain 在 PVC 刪除後的不同後果。',
   'ServiceAccount||能說明 Pod 以掛載的 SA token 呼叫 API server,身分就是該 SA。',
   'Role、ClusterRole||能說明 namespace-scoped 與 cluster-scoped 的差異,以及 ClusterRole 也可被 RoleBinding 借用。',
   'RoleBinding、ClusterRoleBinding||能把 Role 綁定到 ServiceAccount 並實測權限生效。',
   'least privilege||能只授予需要的 verbs/resources,說明為何不能圖方便給 cluster-admin。',
   'kubectl auth can-i||能用 --as=system:serviceaccount:ns:name 模擬身分驗證權限矩陣。']},
  {h:'實作任務',k:'task',items:['建立 tenant-a namespace','建立 ServiceAccount','Role 只允許讀 Pod','使用 NetworkPolicy 限制服務流量','建立 PVC 並驗證 Pod 重建後資料仍存在','建立 Gateway / HTTPRoute 的最小範例']},
  {h:'驗收標準',k:'accept',items:['RBAC 權限如預期(auth can-i 驗證)','NetworkPolicy 有效阻擋非允許流量','PVC 資料在 Pod 重建後仍存在','建立 release tag:v0.3-kubernetes']}]}
]},
{p:4,range:'第 11–13 週',title:'Kubernetes API Machinery、client-go 與自製 Controller',goal:'先理解 Operator 底層 control loop,再使用高階框架。',outputs:['client-go Deployment Health Controller','control loop 架構圖','一份「事件不等於狀態」的技術筆記','controller reliability 測試報告'],weeks:[
 {w:11,t:'Kubernetes API Object 與 Client',secs:[
  {h:'必學內容',k:'learn',items:[
   'Group、Version、Kind||能說明 GVK(型別)與 GVR(REST 路徑)的差異,並用 kubectl api-resources 查對應。',
   'resource 與 subresource||能說明 /status、/scale subresource 存在的意義:權限與更新路徑分離。',
   'metadata、spec、status||能說明 spec 是使用者意圖、status 是 controller 的觀察結果,各由誰負責寫。',
   'labels、annotations、selectors||能說明 label 供查詢與 selector 匹配、annotation 存附註資料不可查詢。',
   'UID、generation、resourceVersion||能說明 generation 只在 spec 變更時遞增、resourceVersion 每次寫入都變、UID 辨識重建。',
   'optimistic concurrency||能實際製造一次 409 Conflict,並以「重新讀取 → 重套變更 → 重試」處理。',
   'watch 與 list-watch||能說明先 list 取得 resourceVersion、再從該版本開始 watch 的銜接機制。',
   'API discovery||能用 discovery client 列出 server 支援的 group/version/resource。',
   'typed client 與 dynamic client||能各寫一段列出 Deployment 的程式,並說明取捨:型別安全 vs 不需編譯期知道型別。',
   'RESTMapper||能說明它負責 GVK ↔ GVR 的映射,dynamic client 需要它找到 REST 路徑。',
   'unstructured object||能用 unstructured.Unstructured 讀寫任意資源的欄位。',
   'server-side apply||能說明 SSA 由 server 合併欄位、以 field manager 記錄欄位擁有者。',
   'patch:merge、strategic merge、JSON patch||能說明 strategic merge 對 list 依 patchMergeKey 合併,JSON patch 是精確的操作序列。']},
  {h:'實作任務:建立 CLI',k:'task',items:['列出 namespace 內 Deployment','顯示 desired / available replicas','使用 label selector 篩選','使用 patch 修改 annotation','處理 resourceVersion conflict']},
  {h:'驗收標準',k:'accept',items:['CLI 可正確操作與篩選 Deployment','conflict 處理有重試邏輯','能說明 resourceVersion 與 optimistic concurrency']}]},
 {w:12,t:'Informer、Cache、Workqueue',secs:[
  {h:'必學內容',k:'learn',items:[
   'SharedInformer||能說明多個 controller 共用同一份 watch 與 cache 的理由:減少 API server 負擔。',
   'local cache 與 lister||能說明從 lister 讀取不會打 API server,代價是可能讀到稍舊的資料。',
   'event handler||能註冊 Add/Update/Delete handler,且 handler 只做一件事:把 key 丟進 queue。',
   'workqueue 與 rate-limiting queue||能說明 queue 對同一 key 去重、失敗後以退避延遲重新入列的行為。',
   'key-based processing||能說明為何 queue 存 namespace/name 而非整個物件:處理時永遠以最新狀態為準。',
   'resync||能說明 resync 是本地 cache 定期重播所有物件給 handler,不是重新向 API server list。',
   'at-least-once delivery||能說明同一 key 可能被處理多次,因此 reconcile 必須冪等。',
   'event coalescing||能說明短時間多次更新可能合併為一次處理,controller 不能假設看得到每次變化。',
   'controller 不應依賴事件順序||能舉例:網路重連後事件順序可能與實際發生順序不同。',
   'cache stale read||能說明剛寫入的物件立即從 cache 讀可能還讀不到,以及對策(容忍或直讀 API)。']},
  {h:'實作任務:Deployment Health Controller',k:'task',code:'Watch Deployment\n→ 將 namespace/name 放入 queue\n→ worker 讀取 key\n→ 從 cache 取得 object\n→ 比較 desired 與 available replicas\n→ 輸出 metric / Event\n→ 失敗時 rate-limited retry',items:['依左列 control loop 完成 controller']},
  {h:'驗收標準',k:'accept',items:['支援多 worker','shutdown 時正確關閉 queue','transient error 會重試','permanent error 不無限重試']}]},
 {w:13,t:'Controller Reliability',secs:[
  {h:'必學內容',k:'learn',items:[
   'idempotency||reconcile 同一物件連跑 10 次,結果與跑 1 次完全相同、無重複副作用。',
   'level-triggered 與 edge-triggered||能說明 level-triggered 只看「現在的狀態」決定行動,不依賴事件內容 — 錯過事件也能收斂。',
   'reconcile convergence||能說明單次 reconcile 不必做完所有事,只要每次都朝 desired state 前進。',
   'eventual consistency||能接受系統短暫不一致,以 requeue 與重試等待收斂,而不是同步阻塞等待。',
   'rate limiting 與 exponential backoff||能設定失敗 requeue 的退避,避免壞物件把 API server 打爆。',
   'conflict retry||能正確處理 status 更新的 409:重讀最新版本再套用變更。',
   'duplicate event||能以測試證明重複事件不會造成重複建立資源。',
   'cache delay||能處理「剛建立的 child 還沒進 cache」導致的誤判(如用 AlreadyExists 容錯)。',
   'leader election||能說明 controller 多副本時只有 leader 執行 reconcile,避免互相衝突。',
   'controller metrics||能暴露 reconcile 次數、耗時、錯誤數與 queue 深度。',
   'Kubernetes Event||能發出 Event,讓使用者用 kubectl describe 看到 controller 做了什麼。']},
  {h:'實作任務',k:'task',items:['對自製 controller 加入 metrics','模擬 API server 暫時失敗','模擬 watch restart','模擬 object 快速連續更新','寫 controller unit test']},
  {h:'驗收標準',k:'accept',items:['故障模擬後 controller 能收斂','metrics 反映 reconcile 行為','unit test 覆蓋 reconcile 決策']}]}
]},
{p:5,range:'第 14–18 週',title:'Kubebuilder、CRD 與 Tenant Operator',goal:'掌握正式 Operator 開發流程與 Kubernetes-native API 設計。',outputs:['Tenant Operator','CRD API 文件','condition 與 error catalog','operator e2e test','upgrade / deletion runbook'],weeks:[
 {w:14,t:'Kubebuilder 與 CRD API Design',secs:[
  {h:'必學內容',k:'learn',items:[
   'Kubebuilder project layout||能說出 api/(型別定義)、controllers/(reconcile)、main.go(manager 啟動)各自的角色。',
   'API group / version||能解釋 platform.example.com/v1alpha1 的組成,以及 group 用網域避免衝突。',
   'markers 與 deepcopy||能說明 +kubebuilder: marker 如何生成 CRD schema,以及 DeepCopy 為何是 API 型別的必要條件。',
   'CRD schema 與 structural schema||能說明 structural schema 是 CRD 進階功能(defaulting、pruning)的前提。',
   'OpenAPI validation||能為欄位加 Required / Format 等限制,並實測 kubectl apply 擋下不合法資料。',
   'defaulting||能在 schema 層以 +kubebuilder:default 設定預設值並驗證生效。',
   'enum、pattern、minimum、maximum||能用 validation marker 限制值域(如 phase 只能是特定字串、quota 不可為負)。',
   'printer columns||能讓 kubectl get tenant 直接顯示 PHASE 等自訂欄位。',
   'status subresource||能說明啟用後 spec 與 status 分開更新,一般 update 不會動到 status。',
   'short name、category||能讓 kubectl get tn(縮寫)與 kubectl get all 類別查詢生效。']},
  {h:'第一個 CRD:Tenant',k:'code',code:'apiVersion: platform.example.com/v1alpha1\nkind: Tenant\nmetadata:\n  name: team-a\nspec:\n  displayName: Team A\n  namespaces:\n    - team-a-dev\n    - team-a-prod\n  quota:\n    cpu: "4"\n    memory: "8Gi"\n    pods: 20\n  defaultLimits:\n    cpu: "1"\n    memory: "1Gi"\nstatus:\n  observedGeneration: 1\n  phase: Ready\n  conditions: []'},
  {h:'驗收標準',k:'accept',items:['無效 quota 無法通過 API validation','kubectl get tenant 顯示 phase','spec 與 status 責任清楚']}]},
 {w:15,t:'Reconcile Loop 與 Child Resources',secs:[
  {h:'Controller 自動建立',k:'learn',items:[
   'Namespace||理解它是租戶隔離的基本邊界,Tenant 的每個 namespace 都由 controller 建立與管理。',
   'ResourceQuota||理解它限制租戶 namespace 的總用量(CPU、記憶體、Pod 數),超額建立會被 API server 拒絕。',
   'LimitRange||理解它給未宣告 requests/limits 的 Pod 補預設值,避免無限制的工作負載。',
   'ServiceAccount||理解它是租戶工作負載在叢集內的身分。',
   'Role 與 RoleBinding||理解它限制租戶只能操作自己 namespace 內的資源。',
   'NetworkPolicy||理解它阻擋跨租戶的網路流量,是隔離的網路層。']},
  {h:'必學內容',k:'learn',items:[
   'controller-runtime client||能用同一個 client Get/List/Create/Update 任意已註冊 scheme 的型別。',
   'CreateOrUpdate pattern||能用 ctrl.CreateOrUpdate + mutate function 表達 desired state,不自己寫 if-exists 分支。',
   'controller reference 與 owner reference||能設定 ownerRef 讓刪除 Tenant 時 child resources 被 GC 級聯刪除。',
   'Owns watch||能讓 child resource 被修改/刪除時自動觸發 parent 的 reconcile。',
   'desired resource builder||能把「產生期望的 ResourceQuota」寫成純函式,方便單元測試比對。',
   'immutable field 處理||能處理不可變欄位(如某些 spec 欄位):偵測差異後重建或明確報錯。',
   'status patch||能用 Status().Update / Patch 更新 status,並說明與一般 Update 的權限差異。']},
  {h:'驗收標準',k:'accept',items:['重複 reconcile 不會建立重複資源','手動刪除 child resource 後可自動補回','修改 Tenant spec 後 child resource 會收斂']}]},
 {w:16,t:'Conditions、Status 與 ObservedGeneration',secs:[
  {h:'必學內容',k:'learn',items:[
   'Ready、Progressing、Degraded conditions||能定義三種 condition 的語意,並說明它們可同時存在、各自獨立轉換。',
   'status.observedGeneration||能在 status 記錄已處理的 generation,使用者比對 metadata.generation 即知新 spec 是否已被處理。',
   'reason、message、lastTransitionTime||reason 用機器可讀的 CamelCase、message 給人讀;只有 status 真的改變才更新 transition 時間。',
   'phase 與 conditions 的角色||能說明 phase 是單一摘要值、conditions 是多維度明細,phase 應由 conditions 推導。',
   'status update conflict||能處理多 worker 同時更新 status 的 409:重讀再套用。',
   'user-facing status||設計標準:使用者只看 kubectl get / describe 就知道發生什麼事,不需要翻 controller log。']},
  {h:'實作任務:狀態範例',k:'code',code:'status:\n  observedGeneration: 3\n  conditions:\n    - type: Ready\n      status: "False"\n      reason: RBACProvisioningFailed\n      message: failed to create RoleBinding'},
  {h:'驗收標準',k:'accept',items:['使用者可從 status 判斷目前發生什麼事','spec 新版本尚未處理時可辨識','condition transition 正確']}]},
 {w:17,t:'Finalizer、Deletion 與 External Resource Cleanup',secs:[
  {h:'必學內容',k:'learn',items:[
   'deletionTimestamp||能說明物件帶 finalizer 時,刪除只是設定 deletionTimestamp,物件仍存在等待清理。',
   'finalizer lifecycle||能實作完整流程:reconcile 時加上 finalizer → 偵測到 deletionTimestamp 執行清理 → 清理成功後移除 finalizer。',
   'external resource cleanup||能在物件真正消失前清理 Kubernetes 之外的資源(外部 registry、雲端資源)。',
   'stuck terminating||能診斷物件卡在 Terminating 的原因:finalizer 未被移除,通常是清理失敗或 controller 掛了。',
   'cleanup idempotency||清理重複執行不報錯:外部資源已不存在時視為清理成功。',
   'timeout 與 force delete 的風險||能說明手動硬移除 finalizer 會跳過清理,造成外部資源洩漏 — 只能是最後手段且需記錄。']},
  {h:'實作任務',k:'task',items:['Tenant 刪除前清理模擬外部 registry record','cleanup 失敗時保留 finalizer 並重試','cleanup 成功後移除 finalizer','提供 runbook 處理 stuck finalizer']},
  {h:'驗收標準',k:'accept',items:['刪除流程可靠且 idempotent','stuck finalizer 有處理程序文件']}]},
 {w:18,t:'Webhook、版本演進與 Operator Testing',secs:[
  {h:'必學內容',k:'learn',items:[
   'validating webhook||能拒絕不合法的 CR(如跨欄位邏輯驗證)並回傳使用者看得懂的錯誤訊息。',
   'mutating / defaulting webhook||能在物件寫入前自動補預設值,並說明與 schema default 的差異(可寫邏輯)。',
   'conversion webhook||能說明多版本 CRD 共存時,由它負責版本間的物件轉換。',
   'v1alpha1、v1beta1、v1||能說明版本階段代表的穩定性承諾:alpha 可隨時改、GA 保證相容。',
   'hub / spoke conversion||能說明以一個 hub 版本為中心、其他版本只與 hub 互轉,避免 N×N 轉換。',
   'envtest||能在測試中啟動真實 API server + etcd,驗證 CRD 註冊與 reconcile 行為。',
   'fake client 限制||能舉出 fake client 與真實行為的差異:沒有 GC、沒有 webhook、status 行為不同。',
   'controller integration test||能界定範圍:controller + API server,不含真實工作負載。',
   'end-to-end test||能在 kind 上驗證從建立 Tenant 到 child resources 全部就緒的完整流程。']},
  {h:'實作任務',k:'task',items:['Tenant default quota webhook','驗證 namespace 命名規則','envtest 驗證 reconcile','kind e2e 驗證完整 child resource']},
  {h:'驗收標準',k:'accept',items:['webhook validation / defaulting 生效','envtest 與 e2e 通過','建立 release tag:v0.4-tenant-operator']}]}
]},
{p:6,range:'第 19–21 週',title:'平台 API、OIDC、多租戶安全與可觀測性',goal:'建立使用者入口、雙層授權模型與完整可觀測性。',outputs:['Tenant-aware Platform API','OIDC login / token verification demo','Authorization matrix','Grafana dashboard','基礎 SLO 文件'],weeks:[
 {w:19,t:'Platform API Server 與 TenantService',secs:[
  {h:'必學內容',k:'learn',items:[
   'API layer 與 Kubernetes client boundary||能說明平台 API 不直接暴露 Kubernetes 物件,對外是自己的 DTO、對內才轉成 CR。',
   'ConnectRPC service implementation||能實作 buf 產生的 service interface 並掛上 interceptor。',
   'DTO / CR mapping||能雙向轉換 proto message ↔ Tenant CR,並隔離不該外露的內部欄位。',
   'pagination||能實作 page_token 式分頁,token 內含游標資訊。',
   'field mask 基礎||知道部分更新用 field mask 表達「只更新這些欄位」的語意。',
   'request validation||能在 API 層先驗證(必填、格式、值域),不合法請求不會產生 CR。',
   'idempotency key||能讓帶相同 key 的重複 CreateTenant 只建立一次並回傳相同結果。',
   'audit metadata||能記錄每個變更操作的 who / when / what,供事後追查。',
   'long-running operation pattern||能說明建立是非同步的:API 先回受理,實際狀態由 status / watch 追蹤。']},
  {h:'實作任務:TenantService',k:'task',code:'service TenantService {\n  rpc CreateTenant(CreateTenantRequest) returns (Tenant);\n  rpc GetTenant(GetTenantRequest) returns (Tenant);\n  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse);\n  rpc DeleteTenant(DeleteTenantRequest) returns (DeleteTenantResponse);\n  rpc WatchTenant(WatchTenantRequest) returns (stream TenantEvent);\n}',note:'後端流程:API Request → AuthN/AuthZ → Validate → Create Tenant CR → Operator Reconcile → Stream/Poll Status。',items:['完成 TenantService 與 CR mapping','支援 watch / streaming 狀態']},
  {h:'驗收標準',k:'accept',items:['API 與 Kubernetes client 邊界清楚','建立 Tenant 全流程可運作']}]},
 {w:20,t:'OIDC、JWT 與 Authorization',secs:[
  {h:'必學內容',k:'learn',items:[
   'OAuth 2.0 與 OIDC 差異||能說明 OAuth 2.0 是授權框架,OIDC 在其上加了身分層(ID token 與標準 claims)。',
   'Authorization Code flow||能畫出完整流程:redirect 到 IdP → 使用者登入 → code 換 token,並說明 code 存在的意義。',
   'ID token 與 access token||能說明 ID token 證明「你是誰」給 client、access token 用於呼叫 API。',
   'issuer、audience、subject||能說明驗證 iss 防假 IdP、驗證 aud 防 token 被拿去別的服務用、sub 是使用者識別。',
   'JWKS 與 key rotation||能說明以 token header 的 kid 從 JWKS endpoint 選公鑰,IdP 換鑰時自動更新。',
   'token expiry 與 refresh token 基礎||能處理過期回 401,並說明 refresh token 換新 access token 的流程。',
   'role / group claims||能從自訂 claims(roles、tenant)建立授權決策的輸入。',
   'tenant-aware authorization||能實作:tenant-admin 的每個請求都檢查目標資源屬於自己的 tenant。',
   'confused deputy problem||能舉例說明服務被誘導拿自己的高權限替攻擊者做事,以及驗 audience 如何防範。',
   'RBAC 與 ABAC 概念||能說明角色式(role → 權限)與屬性式(依 tenant、資源屬性判斷)的差異與組合。']},
  {h:'實作任務',k:'task',code:'{\n  "sub": "user-a",\n  "tenant": "team-a",\n  "roles": ["tenant-admin"]\n}',items:['使用 Dex 或 Keycloak','API server 驗證 issuer、audience、signature、expiry','tenant-admin 只能操作自己的 Tenant 與 ModelService','platform-admin 可跨 tenant 管理','Kubernetes ServiceAccount 權限再做第二層限制']},
  {h:'安全原則',k:'code',code:'UI 隱藏按鈕:不是安全控制\nAPI authorization:第一層\nKubernetes RBAC:第二層\nNamespace / NetworkPolicy / Quota:隔離層'},
  {h:'驗收標準',k:'accept',items:['token 驗證完整(issuer/audience/signature/expiry)','跨 tenant 越權測試被拒絕','雙層授權模型可展示']}]},
 {w:21,t:'Metrics、Tracing、Logging 與 Audit',secs:[
  {h:'必學內容',k:'learn',items:[
   'RED metrics:Rate、Errors、Duration||能為 API 服務定義每秒請求數、錯誤率、延遲分佈三組指標。',
   'USE metrics:Utilization、Saturation、Errors||能為資源(queue、worker、連線池)定義使用率、飽和度、錯誤。',
   'Prometheus metric types||能說明 counter(只增)、gauge(可增減)、histogram(分佈)各自適用場景。',
   'cardinality 風險||能說明 label 放 user ID、request ID 等高基數值會讓時序數量爆炸。',
   'OpenTelemetry trace 與 span propagation||能建立 span 並讓 trace context 跨服務傳遞(HTTP header)。',
   'structured log correlation||log 帶 trace ID,可以從一筆 log 跳到對應 trace、再看到全部相關 log。',
   'audit log||能說明與一般 log 的差異:記錄「誰做了什麼決策」、不可竄改、保存期限不同。',
   'SLI、SLO、error budget 基礎||能為平台 API 訂出一條 SLO(如 99% 請求 < 500ms)並說明 error budget 的用途。']},
  {h:'實作任務',k:'task',note:'Tracing:Platform API span → Kubernetes API request span → Operator reconcile log correlation。',items:['API metrics:request count / latency / error count / active request','Controller metrics:reconcile count / duration / error / queue depth / ready tenant count','建立 trace 貫穿 API 與 operator','建立 audit log']},
  {h:'驗收標準',k:'accept',items:['Grafana dashboard 呈現 RED / USE','一筆 request 可從 trace 與 log 完整追蹤','基礎 SLO 文件完成']}]}
]},
{p:7,range:'第 22–24 週',title:'Gateway API、Istio 與 Storage',goal:'理解平台資料面的入口、安全、流量與儲存,而不是只會安裝套件。',outputs:['Gateway / HTTPRoute manifests','Istio mTLS 與 authorization demo','canary routing demo','模型 storage 設計文件'],weeks:[
 {w:22,t:'Gateway API',secs:[
  {h:'必學內容',k:'learn',items:[
   'GatewayClass、Gateway||能說明 GatewayClass 是「哪家實作」、Gateway 是實例(listener 集合),分別由基礎設施與平台團隊管理。',
   'HTTPRoute、GRPCRoute||能寫出含 hostname、path match 與 backendRef 的 route。',
   'ReferenceGrant||能說明 route 引用其他 namespace 的 Service 時,需要目標 namespace 明確授權。',
   'listener||能設定 port / protocol / hostname,並說明一個 Gateway 可有多個 listener。',
   'hostname / path matching||能寫 path prefix 與 header match,並說明多條規則的優先序。',
   'route attachment||能說明 route 綁上 gateway 的條件:parentRef + gateway 的 allowedRoutes 同意。',
   'cross-namespace reference||能說明跨 namespace 引用的安全考量:防止別的租戶把流量導到你的服務。',
   'TLS termination||能在 listener 掛上 TLS 憑證(Secret)並驗證 HTTPS 生效。',
   'controller implementation 與標準 API 的區別||能說明 Gateway API 是標準規格,同一份 YAML 換 controller(Istio、Envoy Gateway 等)仍可用。']},
  {h:'實作任務',k:'task',items:['使用 Gateway API 暴露 Platform API','為不同 tenant 建立 route','配置 TLS','驗證 route status conditions','比較 Ingress 與 Gateway API']},
  {h:'驗收標準',k:'accept',items:['多 tenant route 正常運作','TLS 生效','route status conditions 正確']}]},
 {w:23,t:'Istio Traffic、mTLS 與 AuthorizationPolicy',secs:[
  {h:'必學內容',k:'learn',items:[
   'service mesh control plane / data plane||能說明 istiod 下發設定、proxy(Envoy)實際承載流量的分工。',
   'sidecar 或 ambient mode 基礎概念||能說明 sidecar 每個 Pod 一個 proxy、ambient 把 proxy 移到節點層的差異。',
   'PeerAuthentication||能用它啟用 namespace 或 mesh 層級的 mTLS 模式。',
   'DestinationRule||能設定連線池上限與離群偵測(outlier detection)。',
   'VirtualService 與 Gateway API 整合概念||知道 Istio 同時支援自家 VirtualService 與標準 Gateway API 的對應關係。',
   'service identity||能說明 mesh 中服務身分(SPIFFE 格式)綁定 ServiceAccount,而非 IP。',
   'mTLS STRICT / PERMISSIVE||能說明 PERMISSIVE 同時接受明文與 mTLS(遷移期用),STRICT 只收 mTLS。',
   'AuthorizationPolicy||能寫出「只允許特定 principal(SA)呼叫此服務」的 policy 並實測拒絕其他來源。',
   'retries、timeouts、circuit breaking||能在 mesh 層設定,並說明與應用層重試疊加造成 retry storm 的風險。',
   'traffic shifting||能設定 90/10 權重分流並以請求驗證比例。',
   'observability||能查看 mesh 自動產生的服務間 metrics 與 trace,不需改應用程式碼。']},
  {h:'實作任務',k:'task',items:['兩個 Go service 透過 mesh 通訊','啟用 STRICT mTLS','只允許特定 ServiceAccount 呼叫 model service','建立 90/10 canary routing','模擬 retry storm 並調整 policy']},
  {h:'驗收標準',k:'accept',items:['STRICT mTLS 下服務互通','AuthorizationPolicy 有效限制呼叫者','canary 流量分配可驗證']}]},
 {w:24,t:'Storage、Rook/Ceph 與模型資料',secs:[
  {h:'必學內容',k:'learn',items:[
   'block、file、object storage||能各舉一個場景:資料庫用 block、共享檔案用 file、模型檔/備份用 object。',
   'access mode||能說明 RWO(單節點讀寫)與 RWX(多節點讀寫)的差異,以及多數 block storage 不支援 RWX。',
   'reclaim policy||能說明 Delete(PVC 刪除即刪資料)與 Retain(保留待手動處理)的後果。',
   'volume expansion||能擴充一個 PVC 並知道縮小通常不支援。',
   'snapshot 基礎||知道 VolumeSnapshot 可為 PVC 建立時間點快照供還原。',
   'CSI||能說明 CSI driver 是儲存供應商接入 Kubernetes 的標準介面。',
   'Rook Operator 與 Ceph resource 基礎||能說明 Rook 把 Ceph 叢集本身變成 Kubernetes 資源來管理(operator 模式的實例)。',
   'object storage / S3 compatible API||能用 S3 相容 API(如 MinIO)上傳/下載模型檔。',
   '模型 artifact 與 runtime image 分離||能說明理由:模型檔大且更新頻率與程式不同,放 object storage 由 runtime 啟動時載入。',
   'data locality||能說明資料與運算的距離如何影響模型載入時間與推論延遲。']},
  {h:'實作任務',k:'task',items:['使用簡化本機 storage class 完成 PVC 流程','若環境允許,安裝 Rook/Ceph 測試環境','建立模型 artifact storage','驗證 Pod 重建與節點變更後資料行為','寫 storage failure runbook']},
  {h:'驗收標準',k:'accept',items:['模型 artifact storage 可用','storage failure runbook 完成','建立 release tag:v0.5-secure-platform']}]}
]},
{p:8,range:'第 25–27 週',title:'Multi-Cluster Control Plane',goal:'建立可管理多個 Kubernetes cluster 的平台核心能力。',outputs:['Multi-Cluster Manager','Cluster Agent','Cluster CRD','斷線與重連測試','placement decision 文件'],weeks:[
 {w:25,t:'Cluster Registry 與 Multi-Cluster Client',secs:[
  {h:'必學內容',k:'learn',items:[
   'kubeconfig 與 rest.Config||能從 kubeconfig 檔建出 rest.Config 並連上遠端 cluster。',
   'per-cluster client cache||能為每個已註冊 cluster 快取 client,不在每次請求重新建立。',
   'cluster credentials lifecycle||能說明憑證的簽發、儲存、過期與輪替流程。',
   'cluster identity||能用 UID 或憑證唯一識別 cluster,不能只靠名稱(名稱可重複/重建)。',
   'capability discovery||能查詢 member cluster 支援的 API 與資源(如是否裝了 KServe)。',
   'Kubernetes version compatibility||能處理不同版本 cluster 的 API 差異(discovery + 條件邏輯)。',
   'health check 與 heartbeat||能區分管理面主動探測與 agent 被動回報兩種健康機制。',
   'credential encryption||能說明 cluster 憑證屬於高敏感資料,儲存需加密且限制存取。',
   'agentless 與 agent-based 模式||能說明取捨:agentless 需管理面能直連 member;agent 主動連出,適合防火牆後的叢集。']},

 {w:26,t:'Cluster Agent 與 ConnectRPC Streaming',secs:[
  {h:'必學內容',k:'learn',items:[
   'outbound agent connection||能說明 agent 主動連出的好處:member cluster 不需開放任何入站 port。',
   'reverse connection 概念||能說明管理面透過 agent 已建立的連線「反向」下發指令。',
   'heartbeat stream||能維持長連線 streaming,定期回報健康與容量資訊。',
   'reconnect||agent 斷線後能自動重連,重連後重新回報完整狀態。',
   'exponential backoff + jitter||能說明大量 agent 同時斷線重連時,jitter 避免同一瞬間全部湧回。',
   'sequence number||能用序號偵測訊息遺漏或亂序。',
   'duplicate message||重送造成的重複訊息以冪等處理,不重複執行指令。',
   'message acknowledgement||能實作 ack 機制確認指令已被 agent 執行。',
   'offline queue||agent 斷線期間把待回報結果暫存,重連後補送。',
   'eventual consistency||能接受管理面看到的 member 狀態有延遲,設計以收斂為目標。',
   'certificate bootstrap 概念||知道 agent 初次註冊如何安全取得憑證(bootstrap token 換正式憑證)。']},
  {h:'實作任務:建立 cluster-agent',k:'task',code:'Agent 啟動\n→ 讀取 cluster identity\n→ ConnectRPC 連線 management plane\n→ 回報 heartbeat / version / capacity\n→ 接收 deployment instruction\n→ apply resource\n→ 回報 result',items:['依左列流程完成 agent']},
  {h:'驗收標準',k:'accept',items:['heartbeat stream 穩定運作','斷線後自動重連(backoff + jitter)','重複訊息不造成重複執行']}]},
 {w:27,t:'Remote Apply、Failure Handling 與 Scheduling Decision',secs:[
  {h:'必學內容',k:'learn',items:[
   'server-side apply 與 field manager||能以 SSA apply 到 member cluster,並理解不同 field manager 的欄位擁有權衝突。',
   'drift detection||能偵測 member cluster 上的實際資源被人手動改動而偏離 desired state。',
   'desired state replication||能把管理面的 desired state 可靠地同步到 member,重送不會產生副作用。',
   'cluster unavailable||cluster 無法連線時標記狀態並停止無效重試,不阻塞其他 cluster 的處理。',
   'partial failure||能處理一次部署中部分資源成功、部分失敗的情況,並在狀態中如實呈現。',
   'timeout 與 retry budget||能為遠端操作設定逾時與重試上限,避免無限重試。',
   'placement policy||能定義選擇 cluster 的規則輸入:容量、GPU、tenant 限制、健康狀態。',
   'capacity-aware scheduling||能依剩餘容量排除放不下的 cluster。',
   'GPU capability||能依 cluster 回報的 GPU 數量/型號過濾。',
   'tenant policy||能依 tenant allowlist 限制工作負載只能落在允許的 cluster。']},

 {w:28,t:'模型服務與 KServe 基礎',secs:[
  {h:'必學內容',k:'learn',items:[
   'model artifact||能說明模型檔(訓練產出的權重)與程式碼分開存放於 object storage 的理由。',
   'inference runtime||能說明 runtime 負責載入模型並提供標準推論 API,不同框架有對應 runtime。',
   'predictor / transformer / explainer 概念||能說明三個元件:推論本體、前後處理、解釋預測結果。',
   'KServe InferenceService||能寫最小 YAML 部署一個模型並取得 endpoint。',

   'runtime image||能指定或更換 serving runtime image。',
   'readiness / model load||能說明 InferenceService ready 代表模型已載入完成,而非容器啟動而已。',
   'autoscaling 與 scale-to-zero||能設定依流量自動伸縮,無流量時縮到零。',

 {w:31,t:'整合測試、Failure Injection 與 Security Hardening',secs:[
  {h:'測試層級',k:'learn',items:[
   'Unit test||驗證單一函式與決策邏輯,不碰任何外部依賴。',
   'Integration test||驗證模組與真實依賴(DB、API)的協作。',
   'envtest||驗證 controller 對真實 API server 的行為(CRD、status、webhook)。',
   'kind e2e||驗證完整部署後的實際行為:child resources、RBAC、deletion。',
   'multi-cluster e2e||以兩個 kind cluster 驗證 agent、heartbeat 與 remote apply。',
   'API contract test||驗證 API 相容性不被新版本破壞(buf breaking + 行為測試)。',
   'authorization test||驗證所有越權路徑都被拒絕(negative test 為主)。',
   'failure injection||驗證各種故障下系統能收斂與恢復,不靜默壞掉。']},
  {h:'故障情境',k:'exp',items:[
   'API server restart||預期:重啟後服務自動恢復,無資料遺失、client 只看到短暫錯誤。',
   'operator restart||預期:重啟後 reconcile 重新收斂,不產生重複資源或重複副作用。',
   'Kubernetes API timeout||預期:退避重試,不無限重試打爆 API server。',
   'member cluster offline||預期:cluster 狀態轉 Unknown/Unavailable,重連後 desired state 重新同步。',
   'duplicate request||預期:冪等處理,不重複建立資源。',
   'token expired||預期:回 401 且訊息明確,client 可用 refresh 流程恢復。',
   'RBAC denied||預期:回 403 並留下 audit 記錄,不以 500 混淆。',
   'model load failed||預期:ModelService condition 呈現 ModelLoadFailed 與原因,不卡在無資訊的 pending。',
   'gateway route failed||預期:route status conditions 呈現失敗原因。',
   'insufficient GPU||預期:placement 明確拒絕並回報,不讓工作負載無限 Pending。',
   'storage unavailable||預期:錯誤明確、可重試,不靜默失敗。',
   'stuck finalizer||預期:能依 runbook 診斷原因並安全解除,不直接硬刪。']},
  {h:'Security checklist',k:'accept',items:[
   'non-root container||驗證:kubectl exec 進容器 id 顯示 uid 非 0。',
   'read-only root filesystem||驗證:securityContext.readOnlyRootFilesystem: true 且服務功能正常。',
   'least privilege RBAC||驗證:逐一審查每個 ServiceAccount 的權限矩陣,無多餘權限。',
   'no hardcoded secret||驗證:以 gitleaks 等工具掃描整個 repo 歷史。',
   'token validation complete||驗證:過期、錯 audience、錯簽名的 token 全部被拒。',
   'NetworkPolicy default deny||驗證:未被明確允許的 Pod 間流量被擋下。',
   'mTLS||驗證:繞過 mesh 的明文直連被拒絕。',
   'audit log||驗證:任一關鍵操作可追溯到操作者與時間。',
   'dependency scan||驗證:govulncheck / 依賴掃描通過或已記錄豁免。',
   'image scan||驗證:無未處理的高危 CVE。',
   'secret redaction||驗證:在全部 log 中搜尋 token/password 樣式無結果。']}]},

/* ============================================================ render helpers */
function ckList(items,prefix,one){
  const hasDetail=items.some(x=>x.indexOf('||')>-1);
  let h='<ul class="ck'+((one||hasDetail)?' one':'')+'">';
  items.forEach((it,i)=>{
    const id=prefix+'-'+i;
    const parts=it.split('||');
    h+='<li><label><input type="checkbox" data-ck="'+id+'"'+(st.c[id]?' checked':'')+'><span>'+esc(parts[0])+'</span></label>';
    if(parts[1])h+='<div class="ck-d">'+esc(parts[1])+'</div>';
    h+='</li>';
  });
  return h+'</ul>';
}
function codeBlock(code,title){
  return '<pre class="code">'+(title?'<span class="ct">'+esc(title)+'</span>':'')+esc(code)+'</pre>';
}
function renderSec(sec,prefix,si){
  const kindClass=sec.k==='accept'?'accept':(sec.k==='exp'?'exp':'');
  let h='<div class="blk '+kindClass+'" data-kind="'+sec.k+'"><h4>'+esc(sec.h)+'</h4>';
  if(sec.note)h+='<p class="note">'+esc(sec.note)+'</p>';
  if(sec.code)h+=codeBlock(sec.code);
  if(sec.items){
    if(sec.k==='demo'){
      h+='<ol class="demo">'+sec.items.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ol>';
    }else{
      h+=ckList(sec.items,prefix+'-s'+si,sec.items.some(x=>x.length>60));
    }
  }
  return h+'</div>';
}
function renderWeek(wk,prefix,label){
  const wid=prefix+'w'+wk.w;
  let body='';
  if(wk.goal)body+='<p class="note" style="margin-top:12px">'+esc(wk.goal)+'</p>';

function quizStats(){
  let y=0,answered=0,hardMiss=[];
  QUIZ.forEach((g,gi)=>{ if(g.bonus)return;
    g.items.forEach((it,ii)=>{
      const v=st.q['q'+gi+'-'+ii];
      if(v)answered++;
      if(v==='y')y++;
      if(it[1]==='hard'&&v==='n')hardMiss.push(it[0]);
    });
  });
  return {y,answered,hardMiss};
}
function updateQuizVerdict(){
  const {y,answered,hardMiss}=quizStats();

  if(y>=25){cls='v-go';title='可直接開始 32 週主計畫';advice='直接前往「32 週主計畫」分頁,從第 0 週環境建置開始。仍建議先完成 Preflight 專案作為暖身。';}

  let hardHtml='';
  if(hardMiss.length){
    hardHtml='<p style="margin-top:8px"><strong>注意:</strong>下列硬性基礎為「否」,即使分數足夠也建議先補強 — '+hardMiss.map(esc).join('、')+'。</p>';

/* ============================================================ progress computation */
function weekProgress(det){
  const boxes=det.querySelectorAll('input[type="checkbox"][data-ck]');
  const total=boxes.length; let done=0;
  boxes.forEach(b=>{ if(b.checked)done++; });
  const acc=det.querySelectorAll('.blk[data-kind="accept"] input[data-ck]');
  let accDone=acc.length>0;
  acc.forEach(b=>{ if(!b.checked)accDone=false; });
  if(acc.length===0)accDone=(total>0&&done===total);
  const pct=total?Math.round(done/total*100):0;
  return {pct,done,total,complete:accDone};
}
function refresh(){
  let mainDone=0,mainPctSum=0,mainCount=0;
  document.querySelectorAll('details.week').forEach(det=>{
    const p=weekProgress(det);
    det.dataset.done=p.complete?'1':'0';
    const chip=det.querySelector('.wk-chip');
    if(chip){
      chip.className='chip wk-chip '+(p.complete?'ok':(p.done>0?'doing':'todo'));
      chip.textContent=p.complete?'完成':(p.done>0?'進行中':'未開始');
    }
    const bar=det.querySelector('.wk-bar>i'); if(bar)bar.style.width=p.pct+'%';
    const pt=det.querySelector('.wk-pct'); if(pt)pt.textContent=p.pct+'%';
    if(det.id.startsWith('mw')){ mainCount++; mainPctSum+=p.pct; if(p.complete)mainDone++; }
  });
  // phase rails
  PHASES.forEach(ph=>{
    const div=document.getElementById('phase-'+ph.p); if(!div)return;
    const weeks=div.querySelectorAll('details.week');
    let all=true,any=false;
    weeks.forEach(w=>{ if(w.dataset.done==='1')any=true; else all=false;
      if(w.querySelector('input[data-ck]:checked'))any=true; });
    div.classList.toggle('pdone',all&&weeks.length>0);
    div.classList.toggle('pdoing',any&&!all);
  });
  // prelude %
  let pT=0,pD=0;
  document.querySelectorAll('#pre-weeks input[data-ck], #fast-weeks input[data-ck]').forEach(b=>{ pT++; if(b.checked)pD++; });
  const prePct=pT?Math.round(pD/pT*100):0;
  // preflight
  let pfD=0;
  document.querySelectorAll('#preflight-card input[data-ck]').forEach(b=>{ if(b.checked)pfD++; });
  const pfChip=document.getElementById('pf-chip');
  if(pfChip){ pfChip.textContent=pfD+' / '+PREFLIGHT.length; pfChip.className='chip '+(pfD===PREFLIGHT.length?'ok':(pfD>0?'doing':'todo')); }
  // quiz
  const q=quizStats();
  // header stats
  document.getElementById('st-quiz').innerHTML=(q.answered?q.y:'–')+'<small> / 30</small>';
  document.getElementById('st-pre').innerHTML=prePct+'<small> %</small>';
  document.getElementById('st-weeks').innerHTML=mainDone+'<small> / 33 週</small>';
  const mainPct=mainCount?Math.round(mainPctSum/mainCount):0;
  document.getElementById('st-main').innerHTML=mainPct+'<small> %</small>';
  // pipeline
  const set=(n,pct,doneCond)=>{
    const bar=document.getElementById('pb-'+n); if(bar)bar.style.width=pct+'%';
    const stp=document.getElementById('ps-'+n); if(!stp)return;
    stp.classList.toggle('sdone',doneCond);
    stp.classList.toggle('sdoing',!doneCond&&pct>0);
  };
  set(1,Math.round(q.answered/30*100),q.answered>=30);
  set(2,prePct,prePct>=100);
  set(3,Math.round(pfD/PREFLIGHT.length*100),pfD===PREFLIGHT.length);
  set(4,mainPct,mainDone>=33);
  // next hint
  const hint=document.getElementById('next-hint');
  if(hint){
    let msg;
    if(q.answered<30)msg='<strong>下一步:</strong>前往「1 · 自我檢核」完成 30 題核心檢核,決定你的起點。';
    else{
      let next=null;
      document.querySelectorAll('#pane-main details.week').forEach(d=>{ if(!next&&d.dataset.done!=='1')next=d; });
      if(next){
        const t=next.querySelector('.wk-title').textContent;
        const n=next.querySelector('.wk-num').textContent;
        msg='<strong>主計畫下一個目標:</strong>'+esc(n)+' — '+esc(t)+'。前往「3 · 32 週主計畫」繼續。';
      }else msg='<strong>🎉 恭喜!</strong>33 週全部完成 — 你已具備 Cloud-Native AI Platform 的完整實作能力,前往「資源與參考」準備履歷與面試。';
    }
    hint.innerHTML=msg;
  }
}

/* ============================================================ events */
function bind(){
  document.body.addEventListener('change',e=>{
    const t=e.target;
    if(t.matches('input[data-ck]')){
      const id=t.dataset.ck;
      if(t.checked)st.c[id]=1; else delete st.c[id];
      save(); refresh();
    }
  });
  document.body.addEventListener('click',e=>{
    const b=e.target.closest('.seg button');
    if(b){
      const seg=b.closest('.seg'); const id=seg.dataset.q; const v=b.dataset.v;
      if(st.q[id]===v)delete st.q[id]; else st.q[id]=v;
      save();
      seg.querySelectorAll('button').forEach(x=>{
        x.className=(st.q[id]==='y'&&x.dataset.v==='y')?'y-on':((st.q[id]==='n'&&x.dataset.v==='n')?'n-on':'');
      });
      updateQuizVerdict(); updatePreVerdict(); refresh();
      return;
    }
    const tab=e.target.closest('.tab');
    if(tab){ showTab(tab.dataset.pane); }
  });
  document.getElementById('btn-reset').addEventListener('click',()=>{
    if(confirm('確定要清除所有勾選與檢核紀錄嗎?此動作無法復原。')){
      st={c:{},q:{},tab:st.tab}; save(); location.reload();
    }
  });
  document.getElementById('btn-export').addEventListener('click',()=>{
    const blob=new Blob([JSON.stringify(st,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download='learning-progress.json'; a.click();
    URL.revokeObjectURL(a.href);
  });
  document.getElementById('btn-import').addEventListener('click',()=>{
    document.getElementById('import-file').click();
  });
  document.getElementById('import-file').addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const data=JSON.parse(r.result);
        if(typeof data!=='object'||!data||(!data.c&&!data.q))throw new Error('bad');
        if(!confirm('匯入將以檔案內容覆蓋目前進度,確定嗎?'))return;
        st={c:data.c||{},q:data.q||{},tab:data.tab||st.tab};
        save(); location.reload();
      }catch(err){ alert('匯入失敗:這不是有效的進度檔(learning-progress.json)。'); }
    };
    r.readAsText(f);
    e.target.value='';
  });
}
function showTab(name){
  st.tab=name; save();
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.pane===name));
  document.querySelectorAll('section.pane').forEach(p=>p.classList.toggle('on',p.id==='pane-'+name));
  window.scrollTo({top:0});
}

/* ============================================================ boot */
renderOverview(); renderQuiz(); renderPrelude(); renderMain(); renderRes();
bind(); updateQuizVerdict(); updatePreVerdict(); refresh();
showTab(st.tab||'overview');
</script>
